version: "3.9"

services:
  neo4j:
    image: neo4j:5.26.0-community
    container_name: med-kg-neo4j
    ports:
      - "7475:7474"
      - "7690:7687"
    environment:
      NEO4J_AUTH: neo4j/med-kg-password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: med-kg-backend
    ports:
      - "8765:8765"
    env_file:
      - ./backend/.env
    volumes:
      - ../warehouse:/data/warehouse:ro
    depends_on:
      - neo4j
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: med-kg-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
